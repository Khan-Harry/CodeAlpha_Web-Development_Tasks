<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Rhythmix — A premium web-based music player with multi-playlist management, search, and full audio controls.">
    <title>Rhythmix — Music Player</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bg-orbs">
        <div class="orb orb-1"></div>
        <div class="orb orb-2"></div>
        <div class="orb orb-3"></div>
    </div>

    <div class="app-wrapper">

        <!-- ===== LEFT PANEL: Playlists ===== -->
        <nav class="playlists-panel" id="playlists-panel">
            <div class="panel-header">
                <div class="logo">
                    <i class="ph ph-music-notes-simple"></i>
                    <span>Rhythmix</span>
                </div>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle theme">
                    <i class="ph ph-moon" id="theme-icon"></i>
                </button>
            </div>

            <!-- Upload -->
            <input type="file" id="file-input" accept="audio/*" multiple hidden>
            <button class="upload-btn" id="upload-btn" aria-label="Upload music">
                <i class="ph ph-upload-simple"></i>
                <span>Upload Music</span>
            </button>

            <!-- Playlists List -->
            <div class="section-label">
                <span>Playlists</span>
            </div>

            <ul class="playlists-list" id="playlists-list">
                <li class="pl-entry active" data-id="all" id="pl-entry-all">
                    <i class="ph ph-music-notes"></i>
                    <span class="pl-entry-name">All Tracks</span>
                    <span class="pl-entry-count" id="all-count">0</span>
                </li>
                <!-- Named playlists injected here -->
            </ul>

            <button class="new-playlist-btn" id="new-playlist-btn" aria-label="Create new playlist">
                <i class="ph ph-plus-circle"></i>
                <span>New Playlist</span>
            </button>
        </nav>

        <!-- ===== MIDDLE PANEL: Track List ===== -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <h2 class="current-playlist-title" id="current-playlist-title">All Tracks</h2>
                <button class="sidebar-options-btn" id="sidebar-options-btn" aria-label="Playlist options" title="Playlist options" style="display:none;">
                    <i class="ph ph-dots-three-vertical"></i>
                </button>
            </div>

            <!-- Search -->
            <div class="search-bar">
                <i class="ph ph-magnifying-glass"></i>
                <input type="text" id="search-input" placeholder="Search tracks..." autocomplete="off">
            </div>

            <!-- Filter Tabs -->
            <div class="filter-tabs">
                <button class="filter-tab active" data-filter="all">All</button>
                <button class="filter-tab" data-filter="pop">Pop</button>
                <button class="filter-tab" data-filter="rock">Rock</button>
                <button class="filter-tab" data-filter="jazz">Jazz</button>
                <button class="filter-tab" data-filter="classical">Classical</button>
                <button class="filter-tab" data-filter="hiphop">Hip-Hop</button>
            </div>

            <div class="track-list-header">
                <span class="track-count" id="track-count">0 tracks</span>
            </div>

            <ul class="playlist" id="playlist">
                <li class="playlist-empty" id="playlist-empty">
                    <i class="ph ph-music-note"></i>
                    <p>No tracks yet.</p>
                    <p>Upload your music to get started!</p>
                </li>
            </ul>
        </aside>

        <!-- ===== RIGHT PANEL: Player ===== -->
        <main class="player-main">
            <div class="now-playing-card">
                <div class="album-art-wrapper">
                    <div class="album-art" id="album-art">
                        <i class="ph ph-music-note-simple" id="album-icon"></i>
                        <img id="album-img" src="" alt="Album Art" style="display:none;">
                    </div>
                    <div class="vinyl-ring"></div>
                </div>

                <div class="visualizer" id="visualizer">
                    <span></span><span></span><span></span><span></span>
                    <span></span><span></span><span></span><span></span>
                </div>

                <div class="track-info">
                    <h2 class="track-title" id="track-title">No Track Selected</h2>
                    <p class="track-artist" id="track-artist">Upload music to begin</p>
                </div>
                <div class="genre-badge" id="genre-badge" style="display:none;"></div>
            </div>

            <div class="progress-section">
                <span class="time" id="current-time">0:00</span>
                <div class="progress-bar-wrapper" id="progress-wrapper">
                    <div class="progress-bar" id="progress-bar">
                        <div class="progress-fill" id="progress-fill"></div>
                        <div class="progress-thumb" id="progress-thumb"></div>
                    </div>
                </div>
                <span class="time" id="total-time">0:00</span>
            </div>

            <div class="controls">
                <button class="ctrl-btn" id="shuffle-btn" aria-label="Shuffle" title="Shuffle">
                    <i class="ph ph-shuffle"></i>
                </button>
                <button class="ctrl-btn ctrl-main" id="prev-btn" aria-label="Previous">
                    ⏮
                </button>
                <button class="ctrl-btn ctrl-play" id="play-btn" aria-label="Play/Pause">
                    <span id="play-icon">▶</span>
                </button>
                <button class="ctrl-btn ctrl-main" id="next-btn" aria-label="Next">
                    ⏭
                </button>
                <button class="ctrl-btn" id="repeat-btn" aria-label="Repeat" title="Repeat">
                    <i class="ph ph-repeat"></i>
                </button>
            </div>

            <div class="volume-section">
                <button class="volume-icon-btn" id="mute-btn" aria-label="Mute">
                    <i class="ph ph-speaker-high" id="volume-icon"></i>
                </button>
                <div class="volume-slider-wrapper">
                    <input type="range" id="volume-slider" min="0" max="1" step="0.01" value="0.7" aria-label="Volume">
                </div>
                <span class="volume-pct" id="volume-pct">70%</span>
            </div>
        </main>
    </div>

    <!-- ===== ADD TO PLAYLIST MODAL ===== -->
    <div class="modal-overlay" id="modal-overlay" style="display:none;">
        <div class="modal" id="add-to-playlist-modal">
            <div class="modal-header">
                <h3>Add to Playlist</h3>
                <button class="modal-close" id="modal-close" aria-label="Close"><i class="ph ph-x"></i></button>
            </div>
            <p class="modal-track-name" id="modal-track-name"></p>
            <ul class="modal-playlist-list" id="modal-playlist-list"></ul>
            <button class="modal-new-btn" id="modal-new-playlist-btn">
                <i class="ph ph-plus-circle"></i> Create new playlist & add
            </button>
        </div>
    </div>

    <!-- ===== RENAME MODAL ===== -->
    <div class="modal-overlay" id="rename-overlay" style="display:none;">
        <div class="modal" id="rename-modal">
            <div class="modal-header">
                <h3 id="rename-modal-title">Name your Playlist</h3>
                <button class="modal-close" id="rename-close" aria-label="Close"><i class="ph ph-x"></i></button>
            </div>
            <input type="text" id="rename-input" class="rename-input" placeholder="e.g. Workout, Chill, Road Trip..." maxlength="30">
            <button class="modal-confirm-btn" id="rename-confirm">Save</button>
        </div>
    </div>

    <!-- ===== CONTEXT MENU ===== -->
    <div class="context-menu" id="context-menu" style="display:none;">
        <button class="ctx-item" id="ctx-add-to-playlist"><i class="ph ph-plus-circle"></i> Add to Playlist</button>
        <button class="ctx-item" id="ctx-remove-from-playlist"><i class="ph ph-trash"></i> Remove from Playlist</button>
        <div class="ctx-divider"></div>
        <button class="ctx-item" id="ctx-delete-track"><i class="ph ph-x-circle"></i> Delete from Library</button>
    </div>

    <!-- ===== PLAYLIST OPTIONS MENU ===== -->
    <div class="context-menu" id="pl-options-menu" style="display:none;">
        <button class="ctx-item" id="ctx-rename-playlist"><i class="ph ph-pencil-simple"></i> Rename Playlist</button>
        <button class="ctx-item ctx-danger" id="ctx-delete-playlist"><i class="ph ph-trash"></i> Delete Playlist</button>
    </div>

    <audio id="audio-player" preload="metadata"></audio>
    <script src="script.js"></script>
</body>
</html>
